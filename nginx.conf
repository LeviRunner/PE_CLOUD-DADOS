user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstream para balanceamento (opcional)
    # upstream backend {
    #     server app1:3000;
    #     server app2:3000;
    # }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name _;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # SPA Routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Service Worker
        location = /sw.js {
            add_header Cache-Control "max-age=0, no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header Service-Worker-Allowed "/";
        }

        # Manifest
        location = /manifest.json {
            add_header Content-Type "application/manifest+json";
            add_header Cache-Control "max-age=86400, public";
        }

        # Assets estáticos com cache longo
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "max-age=31536000, public, immutable";
            add_header Pragma "public";
            add_header Expires "31536000";
            access_log off;
        }

        # HTML sem cache
        location ~* \.html$ {
            add_header Cache-Control "max-age=0, no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # CORS para recursos
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "max-age=31536000, public, immutable";
        }

        # Negar acesso a arquivos sensíveis
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Status do nginx (opcional, retire em produção)
        location /nginx-status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }

        # Gzip
        gzip on;
        gzip_vary on;
        gzip_min_length 1000;
        gzip_proxied any;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/json
            application/javascript
            application/xml+rss;
    }

    # Redirecionar HTTP para HTTPS (descomente em produção com SSL)
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name seu-dominio.com;
    #     return 301 https://$server_name$request_uri;
    # }

    # HTTPS (descomente e configure com seus certificados)
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name seu-dominio.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/seu-dominio.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # ... resto da configuração igual ao acima ...
    # }
}
